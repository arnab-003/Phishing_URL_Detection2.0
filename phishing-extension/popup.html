<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phish Guard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #fff;
      min-width: 280px;
    }
    .container {
      padding: 16px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    p {
      margin: 6px 0;
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    #moreInfoBtn {
      background: #2563eb;
      color: white;
    }
    .safe-btn {
      background: #16a34a;
      color: white;
    }
    .danger-btn {
      background: #dc2626;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Phish Guard</h2>
    <p id="status">Waiting for prediction...</p>
    <p id="url"></p>
    <p id="normalizedUrl"></p>
    <p id="risk"></p>
    <p id="score"></p>

    <div class="btn-row" id="manualActionRow"></div>

    <div class="btn-row">
      <button id="moreInfoBtn" type="button">More Info</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
